---
launch:
  - arg: {name: start_rviz, default: 'false', description: automatically start rviz}

  - arg: {name: rviz_path,   default: $(find-pkg-share spark_fast_lio)/rviz/ouster_32.rviz, description: rviz file to load}
  - arg: {name: config_path, default: $(find-pkg-share spark_fast_lio)/config/ouster_32.yaml, description: Model-specific configuration}

  - node:
      pkg: spark_fast_lio
      exec: spark_lio_mapping
      name: lio_mapping
      output: screen
      on_exit: shutdown

      param:
        - from: $(var config_path)

  - node:
      if: $(var start_rviz)
      pkg: rviz2
      exec: rviz2
      name: "rviz"
      launch-prefix: "nice"
      output: "screen"
      args: >
        -d $(var rviz_path)
